apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestra-rag
  labels:
    app: orchestra-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestra-rag
  template:
    metadata:
      labels:
        app: orchestra-rag
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: orchestra-rag
          image: orchestra-rag:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: OARAG_BACKEND
              value: "mock"
            - name: OARAG_REQUIRE_AUTH
              value: "true"
            - name: OARAG_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: orchestra-rag-secrets
                  key: database-url
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: orchestra-rag-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: orchestra-rag
  labels:
    app: orchestra-rag
spec:
  selector:
    app: orchestra-rag
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP

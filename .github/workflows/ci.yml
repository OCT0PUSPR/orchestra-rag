name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lightweight dependencies (no heavy ML / no torch)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-min.txt
          pip install ruff mypy bandit pytest-cov
          pip install -e .

      - name: Lint with ruff
        run: ruff check orchestra tests scripts

      - name: Type-check with mypy
        run: mypy orchestra

      - name: Security scan with bandit
        run: bandit -r orchestra -ll -q

      - name: Compile-check all modules
        run: python -m compileall orchestra tests scripts

      - name: Run tests + coverage (fully offline — no API key, no network, no torch)
        env:
          OARAG_BACKEND: mock
        run: pytest --cov=orchestra --cov-report=term-missing --cov-fail-under=80 -q
